<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="1200" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#24243e"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
  </defs>

  <!-- Top wave coming from page -->
  <path d="M0,0 L1200,0 L1200,30 C1000,15 800,55 600,30 C400,5 200,45 0,25 Z"
    fill="#0d1117" opacity="0.95"/>
  <path d="M0,0 L1200,0 L1200,20 C1050,8 850,40 650,22 C450,4 200,35 0,18 Z"
    fill="#0d1117" opacity="0.5"/>

  <!-- Background -->
  <path d="M0,25 C200,45 400,5 600,30 C800,55 1000,15 1200,30 L1200,100 L0,100 Z"
    fill="url(#grad)"/>

  <!-- Accent -->
  <circle cx="600" cy="80" r="50" fill="#7c3aed" opacity="0.10"/>

  <!-- Footer text -->
  <text x="600" y="72"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    fill="#a78bfa"
    text-anchor="middle"
    opacity="0.85"
    letter-spacing="1">Made with ❤️ by </text>
  <text x="690" y="72"
    font-family="'Dancing Script', 'Brush Script MT', 'Segoe Script', cursive"
    font-size="17"
    fill="#c4b5fd"
    text-anchor="middle"
    opacity="0.95">Brandon</text>
  <text x="755" y="72"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    fill="#c4b5fd"
    text-anchor="middle"
    opacity="0.9"> 😛</text>
</svg>
