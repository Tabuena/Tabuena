<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#grad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
    <line x1="800" y1="0" x2="800" y2="160"/>
    <line x1="1000" y1="0" x2="1000" y2="160"/>
  </g>

  <!-- Accent glow circles -->
  <circle cx="100" cy="60" r="80" fill="#7c3aed" opacity="0.12"/>
  <circle cx="1100" cy="80" r="100" fill="#4f46e5" opacity="0.12"/>
  <circle cx="600" cy="30" r="60" fill="#a78bfa" opacity="0.08"/>

  <!-- Main title -->
  <text x="600" y="95"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="68"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="2">Brandon</text>

  <!-- Subtitle -->
  <text x="600" y="128"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="15"
    font-weight="400"
    fill="#c4b5fd"
    text-anchor="middle"
    letter-spacing="3">ANDROID DEV  ·  KERNEL &amp; ROM BUILDER  ·  PHILIPPINES</text>

  <!-- Bottom wave -->
  <path d="M0,160 C200,200 400,140 600,170 C800,200 1000,145 1200,165 L1200,200 L0,200 Z"
    fill="#0d1117" opacity="0.95"/>
  <path d="M0,170 C150,195 350,155 550,178 C750,200 950,158 1200,175 L1200,200 L0,200 Z"
    fill="#0d1117" opacity="0.5"/>
</svg>
